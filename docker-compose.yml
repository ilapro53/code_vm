services:
  ai-tool:
    build:
      context: .
      args:
        AGENT: mimo
    volumes:
      - ./mnt:/workspace/mnt:rw
      - ./input:/workspace/input:ro
      - ./grant_data:/workspace/.grant_data:rw
      - /home:/host_mnt/home:rw
      - /mnt:/host_mnt/mnt:rw
      - /opt:/host_mnt/opt:rw
    cap_add:
      - SYS_ADMIN
    stdin_open: true
    tty: true
