services:
  ai-tool:
    build:
      context: .
      args:
        AGENT: mimo
    volumes:
      - ./mnt:/workspace/mnt:rw
      - ./input:/workspace/input:ro
      - ./grant_data:/workspace/.grant_data:rw
      - 'C:\:/host_mnt/c:rw'
      - 'D:\:/host_mnt/d:rw'
      - 'E:\:/host_mnt/e:rw'
      - 'F:\:/host_mnt/f:rw'
      - 'O:\:/host_mnt/o:rw'
      - 'T:\:/host_mnt/t:rw'
    cap_add:
      - SYS_ADMIN
    stdin_open: true
    tty: true